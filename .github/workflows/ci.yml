name: CI

# PR-time gate: tsc + next build. Anything that lands here gates the merge.
# Image build/push lives in docker_build.yml, which only fires on main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build
